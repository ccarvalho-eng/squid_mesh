name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.4.1"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-elixir-1.19.5-otp-28.4.1-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-elixir-1.19.5-otp-28.4.1-

      - name: Install dependencies
        run: mix deps.get

      - name: Wait for Postgres
        run: until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test

  example-host-app:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: examples/minimal_host_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.4.1"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            examples/minimal_host_app/deps
            examples/minimal_host_app/_build
          key: ${{ runner.os }}-example-mix-elixir-1.19.5-otp-28.4.1-${{ hashFiles('examples/minimal_host_app/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-example-mix-elixir-1.19.5-otp-28.4.1-

      - name: Install dependencies
        run: mix deps.get

      - name: Wait for Postgres
        run: until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done

      - name: Run tests
        run: mix test

      - name: Run smoke path
        run: MIX_ENV=test mix example.smoke
